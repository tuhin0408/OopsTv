name: Sync Upstream

on:
  schedule:
    # Runs everyday at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your fork
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # Fetches all history for all branches and tags
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync and Merge from Upstream
        run: |
          # 1. Configure git identity
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 2. Add the upstream repository
          git remote add upstream https://github.com/IPTVFlixBD/OopsTv.git
          
          # 3. Fetch upstream branches
          git fetch upstream
          
          # 4. Checkout your main branch (adjust if your branch is named master)
          git checkout main
          
          # 5. Merge upstream changes. 
          # This keeps your custom files (like this workflow) intact during the merge.
          git merge upstream/main --allow-unrelated-histories -m "chore: sync with upstream"
          
          # 6. Push the changes back to your fork
          git push origin main
